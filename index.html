<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeLedger // Core Authentication Gateway</title>
  <style>
    /* Futuristic Cyberpunk Design System */
    :root {
      --bg-dark: #03050d;
      --bg-matrix: #060919;
      --panel-glow: rgba(0, 242, 254, 0.15);
      --neon-cyan: #00f2fe;
      --neon-blue: #4facfe;
      --neon-purple: #7000ff;
      --text-crypto: #f1f5f9;
      --text-dim: #64748b;
      --system-red: #ff4a4a;
      --system-green: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-crypto);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, var(--bg-matrix) 0%, var(--bg-dark) 100%);
    }

    .gateway-frame {
      background: rgba(10, 15, 30, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 242, 254, 0.25);
      border-radius: 20px;
      padding: 45px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 
        0 0 50px rgba(0, 0, 0, 0.6),
        0 0 30px var(--panel-glow);
      position: relative;
      overflow: hidden;
    }

    .gateway-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
    }

    .brand-identity {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand-logo {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 50%, var(--neon-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
      display: inline-block;
    }

    .brand-tag {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    .scrypt-shield-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.06);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 25px;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
      color: #a7f3d0;
      font-weight: 600;
    }

    .shield-icon {
      color: var(--system-green);
      animation: pulseGlow 2s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.5; filter: drop-shadow(0 0 2px var(--system-green)); }
      100% { opacity: 1; filter: drop-shadow(0 0 8px var(--system-green)); }
    }

    .vector-group {
      margin-bottom: 24px;
      position: relative;
    }

    .vector-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .cipher-input {
      width: 100%;
      padding: 15px 18px;
      background: rgba(4, 6, 14, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #ffffff;
      font-size: 1rem;
      letter-spacing: 0.5px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .cipher-input:focus {
      outline: none;
      border-color: var(--neon-cyan);
      background: rgba(6, 11, 26, 0.95);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
    }

    .input-error-alert {
      font-size: 0.75rem;
      color: var(--system-red);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
      display: none;
      font-weight: 600;
      animation: alertSlideIn 0.2s ease forwards;
    }

    @keyframes alertSlideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .server-log-box {
      background: rgba(255, 74, 74, 0.07);
      border: 1px dashed rgba(255, 74, 74, 0.3);
      padding: 12px 16px;
      border-radius: 8px;
      color: var(--system-red);
      font-size: 0.75rem;
      font-family: monospace;
      margin-bottom: 24px;
      display: none;
      word-break: break-word;
    }

    /* Dual Button Workspace Layout */
    .action-button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 10px;
    }

    .terminal-button {
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary-login {
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue));
      color: #03050d;
      box-shadow: 0 4px 20px rgba(0, 242, 254, 0.2);
    }

    .btn-primary-login:hover {
      box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
      transform: translateY(-1px);
    }

    .btn-secondary-signup {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 242, 254, 0.3);
      color: var(--neon-cyan);
    }

    .btn-secondary-signup:hover {
      background: rgba(0, 242, 254, 0.08);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
      transform: translateY(-1px);
    }

    .gateway-footer-links {
      display: flex;
      justify-content: center;
      margin-top: 25px;
      font-size: 0.8rem;
    }

    .gateway-link {
      color: var(--text-dim);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .gateway-link:hover {
      color: var(--neon-cyan);
    }
  </style>
</head>
<body>

  <div class="gateway-frame">
    <div class="brand-identity">
      <div class="brand-logo">EdgeLedger</div>
      <div class="brand-tag">Core Authentication Gateway</div>
    </div>

    <div class="scrypt-shield-badge">
      <span class="shield-icon">🛡</span>
      <span>SCRYPT CRYPTO ENGINE STABLE // AES-256</span>
    </div>

    <div id="server-log" class="server-log-box"></div>

    <div id="view-gateway">
      <div class="vector-group">
        <div class="vector-label"><span>Operator Email</span></div>
        <input type="email" id="auth-email" class="cipher-input" placeholder="name@domain.com">
        <div id="auth-email-error" class="input-error-alert"></div>
      </div>

      <div class="vector-group">
        <div class="vector-label"><span>Access Cipher</span></div>
        <input type="password" id="auth-password" class="cipher-input" placeholder="••••••••">
        <div id="auth-password-error" class="input-error-alert"></div>
      </div>

      <div class="action-button-row">
        <button class="terminal-button btn-primary-login" id="btn-login" onclick="triggerAuthorization()">Log In</button>
        <button class="terminal-button btn-secondary-signup" id="btn-register" onclick="triggerRegistration()">Sign Up</button>
      </div>

      <div class="gateway-footer-links">
        <span class="gateway-link" onclick="triggerRecoveryPipeline()">Lost Access Cipher? Reset Node</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    // PRODUCTION PROJECT ENVIRONMENT SETTINGS
    const firebaseConfig = {
      apiKey: "AIzaSyDpL5azC_gO0w_pV5aJbyTKVzTXB7Bl6ms",
      authDomain: "edgeledger-real-18d9b.firebaseapp.com",
      projectId: "edgeledger-real-18d9b",
      storageBucket: "edgeledger-real-18d9b.firebasestorage.app",
      messagingSenderId: "898193365823",
      appId: "1:898193365823:web:cc6360ca3f105c7475518a",
      measurementId: "G-J7YMREZ0KZ"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);

    const logBox = document.getElementById("server-log");
    const emailInput = document.getElementById("auth-email");
    const passInput = document.getElementById("auth-password");
    
    const emailError = document.getElementById("auth-email-error");
    const passwordError = document.getElementById("auth-password-error");

    function clearErrors() {
      logBox.style.display = "none";
      logBox.innerText = "";
      emailError.style.display = "none";
      emailError.innerText = "";
      passwordError.style.display = "none";
      passwordError.innerText = "";
    }

    function isInvalidEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return !re.test(email);
    }

    // FUNCTION 1: ACCESSED VIA THE 'LOG IN' BUTTON
    window.triggerAuthorization = function() {
      clearErrors();
      const email = emailInput.value.trim();
      const password = passInput.value;

      if (!email) {
        emailError.innerText = "⚠ Email field required";
        emailError.style.display = "block";
        return;
      }
      if (isInvalidEmail(email)) {
        emailError.innerText = "⚠ Invalid format structure";
        emailError.style.display = "block";
        return;
      }
      if (!password) {
        passwordError.innerText = "⚠ Password field required";
        passwordError.style.display = "block";
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          logBox.innerText = `[SERVER AUTH FAULT]: ${error.message.replace("Firebase: ", "").toUpperCase()}`;
          logBox.style.display = "block";
        });
    };

    // FUNCTION 2: ACCESSED VIA THE 'SIGN UP' BUTTON
    window.triggerRegistration = function() {
      clearErrors();
      const email = emailInput.value.trim();
      const password = passInput.value;

      if (!email) {
        emailError.innerText = "⚠ Email field required";
        emailError.style.display = "block";
        return;
      }
      if (isInvalidEmail(email)) {
        emailError.innerText = "⚠ Invalid format structure";
        emailError.style.display = "block";
        return;
      }
      if (!password) {
        passwordError.innerText = "⚠ Password field required";
        passwordError.style.display = "block";
        return;
      }
      if (password.length < 6) {
        passwordError.innerText = "⚠ Password requires 6+ characters";
        passwordError.style.display = "block";
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          logBox.innerText = `[SERVER REGISTER FAULT]: ${error.message.replace("Firebase: ", "").toUpperCase()}`;
          logBox.style.display = "block";
        });
    };

    // FUNCTION 3: TRIPPED BY THE PASSWORD RESET LINK
    window.triggerRecoveryPipeline = function() {
      clearErrors();
      const email = emailInput.value.trim();

      if (!email) {
        emailError.innerText = "⚠ Enter your email address above first";
        emailError.style.display = "block";
        return;
      }
      if (isInvalidEmail(email)) {
        emailError.innerText = "⚠ Invalid format structure";
        emailError.style.display = "block";
        return;
      }

      sendPasswordResetEmail(auth, email)
        .then(() => {
          logBox.innerText = "[TRANSMISSION SUCCESSFUL]: RESET LINK DIRECTED TO YOUR MAILBOX.";
          logBox.style.display = "block";
          logBox.style.backgroundColor = "rgba(16, 185, 129, 0.07)";
          logBox.style.borderColor = "rgba(16, 185, 129, 0.3)";
          logBox.style.color = "var(--system-green)";
        })
        .catch(error => {
          logBox.innerText = `[SERVER PIPELINE FAULT]: ${error.message.replace("Firebase: ", "").toUpperCase()}`;
          logBox.style.display = "block";
          logBox.style.backgroundColor = "rgba(255, 74, 74, 0.07)";
          logBox.style.borderColor = "rgba(255, 74, 74, 0.3)";
          logBox.style.color = "var(--system-red)";
        });
    };

  
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDpL5azC_gO0w_pV5aJbyTKVzTXB7Bl6ms",
    authDomain: "edgeledger-real-18d9b.firebaseapp.com",
    projectId: "edgeledger-real-18d9b",
    storageBucket: "edgeledger-real-18d9b.firebasestorage.app",
    messagingSenderId: "898193365823",
    appId: "1:898193365823:web:928dce43f2f9461075518a",
    measurementId: "G-Z92BDLPLT7"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  
  </script>
</body>
</html>
